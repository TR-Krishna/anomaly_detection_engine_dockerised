name: CI/CD Pipeline
on:
  push:
    branches: [main]
  workflow_dispatch:
 
# permissions:
#   contents: read
#   packages: write

jobs: 
  build-and-push: 
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # - name: Login to GHCR
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}

      - name : Login to Dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        
      - name: Build and Push Backend 
        uses: docker/build-push-action@v5
        with: 
           context: ./ecosentinel-backend
           file: ./ecosentinel-backend/Dockerfile
           push: true
           tags: krishnatr/ecosentinel-be:latest  
           cache-from: type=gha
           cache-to: type=gha,mode=max

      - name: Build and Push Frontend 
        uses: docker/build-push-action@v5
        with: 
           context: ./ecosentinel-frontend
           file: ./ecosentinel-frontend/Dockerfile
           push: true
           tags: krishnatr/ecosentinel-fe:latest 
           cache-from: type=gha
           cache-to: type=gha,mode=max

     
  